# Configuracao do PadelPro Vision.
# Copia para config.yaml e ajusta aos nomes/escalas do teu pipeline.

fps: 30

court:
  # Dimensoes oficiais de padel (metros).
  width: 10.0       # eixo x
  length: 20.0      # eixo y
  net_y: 10.0       # posicao da rede no eixo y
  # origin: "corner"  -> coords 0..width, 0..length (rede em net_y)
  # origin: "centered" -> origem no centro, rede em y=0 (como o padel_analytics).
  #   Neste modo o loader desloca automaticamente para "corner".
  origin: centered

# Mapeamento de colunas do CSV principal (output do padel_analytics).
# Por defeito segue o into_dataframe() do repo do Joao.
columns:
  frame: frame
  time: time
  player_x: "player{id}_x"      # {id} = 1..4
  player_y: "player{id}_y"
  player_speed: "player{id}_Vnorm1"   # null -> calculado das posicoes

# Ficheiro opcional da bola
ball:
  path: null
  frame: frame
  x: ball_x
  y: ball_y
  hit: ball_hit                 # coluna booleana opcional

# Ficheiro opcional de pancadas ja detetadas
shots:
  path: null
  frame: frame
  player_id: player_id
  stroke: stroke
  incoming_ball_speed: incoming_ball_speed   # opcional

# Modulo 1 - tempo util
active_time:
  speed_threshold: 1.5     # m/s; acima disto a bola/jogo esta "ativo"
  min_pause_s: 2.0         # pausa so conta apos este tempo parado (regra v9)
  min_rally_s: 1.0         # descarta rallies mais curtos que isto

# Modulo 2 - fases (regra das duas boxes, v9): DEFESA / TRANSICAO / ATAQUE
# Zonas por distancia a rede (metros). Transicao fica entre as duas marcas.
phases:
  attack_max_m: 3.0    # <= isto da rede = ATAQUE (a' frente da intersecao malha 3/2)
  defense_min_m: 7.0   # >= isto da rede = DEFESA (atras da linha de servico)

# Modulo 3 - pancadas/erros (heuristica; calibrar com dados anotados)
shots_analysis:
  forced_speed_threshold: 18.0   # m/s; bola recebida rapida -> tende a forcado
  forced_reach_threshold_m: 2.0  # jogador longe da bola -> tende a forcado
